[book]
title = "Build Your Own Mini Coding Agent in TypeScript"
authors = ["mini-claw-code contributors"]
language = "en"
src = "src"

[build]
build-dir = "book/en"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
additional-js = ["mermaid.min.js", "mermaid-init.js", "lang-switcher.js"]
additional-css = ["lang-switcher.css"]
site-url = "/mini-claw-code/ts/en/"
git-repository-url = "https://github.com/dzungtri/mini-claw-code"
git-repository-icon = "fab-github"
